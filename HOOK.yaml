# Javis P3-2: User-configurable gateway hooks
# These hooks control multi-platform message routing and behavior

gateway:
  # Platform enable/disable
  platforms:
    telegram:
      enabled: false
      token: "${TELEGRAM_BOT_TOKEN}"
    wechat:
      enabled: false
      webhook_url: "${WECHAT_WEBHOOK_URL}"
    slack:
      enabled: false
      bot_token: "${SLACK_BOT_TOKEN}"
      app_token: "${SLACK_APP_TOKEN}"
    discord:
      enabled: false
      bot_token: "${DISCORD_BOT_TOKEN}"
  
  # Message routing rules
  routing:
    # Forward all messages to Javis agent
    forward_to_agent: true
    # Response formatting
    format_markdown: true
    # Max response length per platform
    max_response_length: 4000
    
  # WebSocket relay
  ws_relay:
    enabled: false
    port: 9090
    auth_token: "${WS_AUTH_TOKEN}"

# Hook management
hooks:
  # Custom hook scripts directory
  scripts_dir: "gateway/hooks/"
  # Auto-load hooks on startup
  auto_load: true
